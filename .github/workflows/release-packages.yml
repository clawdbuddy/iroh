name: Release Packages

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g., 1.0.0)"
        required: true
        type: string
      create_release:
        description: "Create GitHub release"
        required: true
        default: "true"
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: release-pkg-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  RUSTFLAGS: -Dwarnings
  RUSTDOCFLAGS: -Dwarnings
  MSRV: "1.91"
  # Binaries to build: iroh-relay, iroh-dns-server
  BIN_NAMES: "iroh-relay,iroh-dns-server"
  DEB_PACKAGE_MAINTAINER: "n0 team"

jobs:
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
      release_version: ${{ env.RELEASE_VERSION }}
    steps:
      - name: Get release version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_version }}" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.release_version }}" >> $GITHUB_ENV
          else
            echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Create GitHub release
        id: release
        if: github.event.inputs.create_release != 'false' || github.event_name == 'push'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: true
          tag_name: ${{ env.RELEASE_VERSION }}
          release_name: ${{ env.RELEASE_VERSION }}

  build-deb-and-tarball:
    timeout-minutes: 120
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64-gnu
            cargo_target: x86_64-unknown-linux-gnu
            release_arch: amd64
            release_os: linux
            libc: gnu
            runner: [self-hosted, linux, X64]
          - name: linux-arm64-gnu
            cargo_target: aarch64-unknown-linux-gnu
            release_arch: arm64
            release_os: linux
            libc: gnu
            runner: [self-hosted, linux, ARM64]
          - name: linux-amd64-musl
            cargo_target: x86_64-unknown-linux-musl
            release_arch: amd64
            release_os: linux
            libc: musl
            runner: [self-hosted, linux, X64]
          - name: linux-arm64-musl
            cargo_target: aarch64-unknown-linux-musl
            release_arch: arm64
            release_os: linux
            libc: musl
            runner: [self-hosted, linux, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo_target }}

      - name: Ensure musl support
        if: ${{ contains(matrix.cargo_target, '-musl') }}
        run: sudo apt-get install musl-tools -y

      - name: Build release
        shell: bash
        run: |
          if [ "${{ contains(matrix.cargo_target, '-musl') }}" = "true" ]; then
            export CARGO_TARGET_$(echo ${{ matrix.cargo_target }} | tr 'a-z-' 'A-Z_')_LINKER=musl-gcc
            export CC=musl-gcc
            export RUSTFLAGS="${RUSTFLAGS:-} -C target-feature=+crt-static -C link-arg=-static"
          fi
          cargo build --profile optimized-release --all-features --target ${{ matrix.cargo_target }}

      - name: Set env vars
        run: |
          echo "RELEASE_ARCH=${{ matrix.release_arch }}" >> $GITHUB_ENV
          echo "RELEASE_OS=${{ matrix.release_os }}" >> $GITHUB_ENV

      - name: Build tar.gz
        shell: bash
        run: |
          IFS=',' read -ra BIN_NAMES <<< "${{ env.BIN_NAMES }}"
          ASSETS=""
          for BIN_NAME in "${BIN_NAMES[@]}"; do
            STAGING="$BIN_NAME-${{ needs.create-release.outputs.release_version }}-${{ matrix.cargo_target }}"
            mkdir -p "$STAGING"
            cp "target/${{ matrix.cargo_target }}/optimized-release/$BIN_NAME" "$STAGING/"
            tar czf "$STAGING.tar.gz" -C "$STAGING" .
            ASSETS+="$STAGING.tar.gz,"
          done
          echo "ASSET=$(echo $ASSETS | sed 's/,$//')" >> $GITHUB_ENV

      - name: Build DEB packages
        shell: bash
        run: |
          IFS=',' read -ra BIN_NAMES <<< "${{ env.BIN_NAMES }}"
          for BIN_NAME in "${BIN_NAMES[@]}"; do
            DIR="debtmp/$BIN_NAME"
            mkdir -p "$DIR/DEBIAN"
            cat > "$DIR/DEBIAN/control" << EOF
            Package: $BIN_NAME
            Version: ${{ needs.create-release.outputs.release_version }}
            Section: net
            Priority: optional
            Architecture: ${{ matrix.release_arch }}
            Maintainer: ${{ env.DEB_PACKAGE_MAINTAINER }}
            Description: Iroh $BIN_NAME
            EOF
            mkdir -p "$DIR/usr/bin"
            cp "target/${{ matrix.cargo_target }}/optimized-release/$BIN_NAME" "$DIR/usr/bin/"
            dpkg-deb --build "$DIR"
            mv debtmp/$BIN_NAME.deb "$BIN_NAME-${{ needs.create-release.outputs.release_version }}-linux-${{ matrix.release_arch }}-${{ matrix.libc }}.deb"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: iroh-${{ matrix.release-os }}-${{ matrix.release_arch }}-${{ matrix.libc }}-bundle
          path: |
            iroh-*.tar.gz
            iroh-*.deb
          compression-level: 0
          retention-days: 1

      - name: Upload to Release
        if: needs.create-release.outputs.upload_url != ''
        uses: n0-computer/actions-upload-release-asset@main
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.ASSET }}

      - name: Upload DEB to Release
        if: needs.create-release.outputs.upload_url != ''
        shell: bash
        run: |
          IFS=',' read -ra BIN_NAMES <<< "${{ env.BIN_NAMES }}"
          for BIN_NAME in "${BIN_NAMES[@]}"; do
            aws s3 cp "$BIN_NAME-${{ needs.create-release.outputs.release_version }}-linux-${{ matrix.release_arch }}-${{ matrix.libc }}.deb" \
              s3://vorc/$BIN_NAME-${{ needs.create-release.outputs.release_version }}-linux-${{ matrix.release_arch }}-${{ matrix.libc }}.deb --no-progress
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-west-2
