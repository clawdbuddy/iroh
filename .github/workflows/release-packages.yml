name: Release Packages

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g., 1.0.0)"
        required: true
        type: string
      upload_url:
        description: "GitHub upload URL"
        required: false
        type: string
        default: ""
  push:
    tags:
      - "v*"

concurrency:
  group: release-pkg-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  RUSTFLAGS: -Dwarnings
  RUSTDOCFLAGS: -Dwarnings
  MSRV: "1.91"
  # Binaries to build: iroh, iroh-relay, iroh-dns-server
  BIN_NAMES: "iroh,iroh-relay,iroh-dns-server"
  DEB_PACKAGE_MAINTAINER: "n0 team"
  DEB_PACKAGE_DESCRIPTION: "Iroh peer-to-peer networking"

jobs:
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
      release_version: ${{ env.RELEASE_VERSION }}
    steps:
      - name: Get release version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_version }}" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.release_version }}" >> $GITHUB_ENV
          else
            echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi
          echo "version: ${{ env.RELEASE_VERSION }}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Create GitHub release
        id: release
        if: github.event.inputs.upload_url != '' || github.event_name == 'push'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: true
          tag_name: ${{ env.RELEASE_VERSION }}
          release_name: ${{ env.RELEASE_VERSION }}

  build-deb:
    timeout-minutes: 120
    name: Build DEB packages
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - bin: iroh
            cargo_target: x86_64-unknown-linux-gnu
            release_arch: amd64
            release_os: linux
            libc: gnu
          - bin: iroh
            cargo_target: aarch64-unknown-linux-gnu
            release_arch: arm64
            release_os: linux
            libc: gnu
          - bin: iroh-relay
            cargo_target: x86_64-unknown-linux-gnu
            release_arch: amd64
            release_os: linux
            libc: gnu
          - bin: iroh-relay
            cargo_target: aarch64-unknown-linux-gnu
            release_arch: arm64
            release_os: linux
            libc: gnu
          - bin: iroh-dns-server
            cargo_target: x86_64-unknown-linux-gnu
            release_arch: amd64
            release_os: linux
            libc: gnu
          - bin: iroh-dns-server
            cargo_target: aarch64-unknown-linux-gnu
            release_arch: arm64
            release_os: linux
            libc: gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo_target }}

      - name: Build release
        run: |
          cargo build --profile optimized-release --all-features --target ${{ matrix.cargo_target }}

      - name: Setup package dirs
        run: |
          echo "RELEASE_ARCH=${{ matrix.release_arch }}" >> $GITHUB_ENV
          echo "RELEASE_OS=${{ matrix.release_os }}" >> $GITHUB_ENV
          mkdir -p debtmp/${{ matrix.bin }}/DEBIAN

      - name: Create DEB package
        shell: bash
        run: |
          BIN=${{ matrix.bin }}
          VERSION=${{ needs.create-release.outputs.release_version }}
          ARCH=${{ matrix.release_arch }}
          DIR=debtmp/$BIN

          # Create control file
          cat > $DIR/DEBIAN/control << EOF
          Package: $BIN
          Version: $VERSION
          Section: net
          Priority: optional
          Architecture: $ARCH
          Maintainer: ${{ env.DEB_PACKAGE_MAINTAINER }}
          Description: ${{ env.DEB_PACKAGE_DESCRIPTION }}
          EOF

          # Create postinst script (optional, for service setup)
          cat > $DIR/DEBIAN/postinst << 'EOF'
          #!/bin/sh
          if [ "$1" = "configure" ]; then
            chmod 755 /usr/bin/$BIN 2>/dev/null || true
          fi
          exit 0
          EOF
          chmod 755 $DIR/DEBIAN/postinst

          # Copy binary
          mkdir -p $DIR/usr/bin
          cp target/${{ matrix.cargo_target }}/optimized-release/$BIN $DIR/usr/bin/

          # Build DEB
          dpkg-deb --build $DIR
          mv debtmp/$BIN.deb $BIN-$VERSION-linux-$ARCH-${{ matrix.libc }}.deb

  build-tarball:
    timeout-minutes: 120
    name: Build tar.gz packages
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64-gnu
            os: ubuntu-latest
            cargo_target: x86_64-unknown-linux-gnu
            release_arch: amd64
            release_os: linux
            libc: gnu
            runner: [self-hosted, linux, X64]
          - name: linux-arm64-gnu
            os: ubuntu-latest
            cargo_target: aarch64-unknown-linux-gnu
            release_arch: arm64
            release_os: linux
            libc: gnu
            runner: [self-hosted, linux, ARM64]
          - name: linux-amd64-musl
            os: ubuntu-latest
            cargo_target: x86_64-unknown-linux-musl
            release_arch: amd64
            release_os: linux
            libc: musl
            runner: [self-hosted, linux, X64]
          - name: linux-arm64-musl
            os: ubuntu-latest
            cargo_target: aarch64-unknown-linux-musl
            release_arch: arm64
            release_os: linux
            libc: musl
            runner: [self-hosted, linux, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo_target }}

      - name: Ensure musl support
        if: ${{ contains(matrix.cargo_target, '-musl') }}
        run: sudo apt-get install musl-tools -y

      - name: Build release
        shell: bash
        run: |
          if [ "${{ contains(matrix.cargo_target, '-musl') }}" = "true" ]; then
            export CARGO_TARGET_$(echo ${{ matrix.cargo_target }} | tr 'a-z-' 'A-Z_')_LINKER=musl-gcc
            export CC=musl-gcc
            export RUSTFLAGS="${RUSTFLAGS:-} -C target-feature=+crt-static -C link-arg=-static"
          fi
          cargo build --profile optimized-release --all-features --target ${{ matrix.cargo_target }}

      - name: Set env
        run: |
          echo "RELEASE_ARCH=${{ matrix.release_arch }}" >> $GITHUB_ENV
          echo "RELEASE_OS=${{ matrix.release_os }}" >> $GITHUB_ENV

      - name: Build tar.gz
        shell: bash
        run: |
          IFS=',' read -ra BIN_NAMES <<< "${{ env.BIN_NAMES }}"
          ASSETS=""
          for BIN_NAME in "${BIN_NAMES[@]}"; do
            STAGING="$BIN_NAME-${{ needs.create-release.outputs.release_version }}-${{ matrix.cargo_target }}"
            mkdir -p "$STAGING"
            cp "target/${{ matrix.cargo_target }}/optimized-release/$BIN_NAME" "$STAGING/"
            tar czf "$STAGING.tar.gz" -C "$STAGING" .
            ASSETS+="$STAGING.tar.gz,"
          done
          echo "ASSET=$(echo $ASSETS | sed 's/,$//')" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: iroh-${{ matrix.release-os }}-${{ matrix.release_arch }}-${{ matrix.libc }}-bundle
          path: iroh-*.tar.gz
          compression-level: 0
          retention-days: 1

      - name: Upload to Release
        if: needs.create-release.outputs.upload_url != ''
        uses: n0-computer/actions-upload-release-asset@main
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.ASSET }}

  build-dns-server:
    timeout-minutes: 60
    name: Build iroh-dns-server
    needs: create-release
    runs-on: [self-hosted, linux, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build iroh-dns-server
        run: |
          cargo build --profile optimized-release --all-features -p iroh-dns-server --target x86_64-unknown-linux-gnu

      - name: Build tar.gz
        run: |
          STAGING="iroh-dns-server-${{ needs.create-release.outputs.release_version }}-x86_64-unknown-linux-gnu"
          mkdir -p "$STAGING"
          cp target/x86_64-unknown-linux-gnu/optimized-release/iroh-dns-server "$STAGING/"
          tar czf "$STAGING.tar.gz" -C "$STAGING" .

      - name: Create DEB package
        shell: bash
        run: |
          BIN=iroh-dns-server
          VERSION=${{ needs.create-release.outputs.release_version }}
          DIR=debtmp/$BIN

          mkdir -p $DIR/DEBIAN
          cat > $DIR/DEBIAN/control << EOF
          Package: $BIN
          Version: $VERSION
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: ${{ env.DEB_PACKAGE_MAINTAINER }}
          Description: Iroh DNS server
          EOF

          mkdir -p $DIR/usr/bin
          cp target/x86_64-unknown-linux-gnu/optimized-release/$BIN $DIR/usr/bin/
          dpkg-deb --build $DIR
          mv debtmp/$BIN.deb $BIN-$VERSION-linux-amd64-gnu.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: iroh-dns-server-bundle
          path: |
            iroh-dns-server-*.tar.gz
            iroh-dns-server-*.deb
          compression-level: 0
          retention-days: 1

      - name: Upload to Release
        if: needs.create-release.outputs.upload_url != ''
        uses: n0-computer/actions-upload-release-asset@main
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: |
            iroh-dns-server-${{ needs.create-release.outputs.release_version }}-x86_64-unknown-linux-gnu.tar.gz
            iroh-dns-server-${{ needs.create-release.outputs.release_version }}-linux-amd64-gnu.deb
